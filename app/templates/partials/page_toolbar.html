<form class="toolbar" method="get">
  <label class="search-box">
    <span>Search</span>
    <input type="search" name="q" value="{{ q | default('') }}" placeholder="{{ search_placeholder | default('Filter records') }}">
  </label>
  <button class="btn btn-secondary" type="submit">Apply</button>
  {% if reset_href %}<a class="btn btn-ghost" href="{{ reset_href }}">Reset</a>{% endif %}
</form>
