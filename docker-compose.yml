services:
  repoforge:
    build: .
    ports:
      - "80:80"
      - "443:443"
    environment:
      REPOFORGE_DATABASE_URL: sqlite:////app/storage/repoforge.db
      REPOFORGE_STORAGE_ROOT: /app/storage
      REPOFORGE_UPLOAD_ROOT: /app/storage/uploads
      REPOFORGE_WORKSPACE_ROOT: /app/storage/workspaces
      REPOFORGE_ARTIFACT_ROOT: /app/storage/artifacts
      REPOFORGE_KEY_ROOT: /app/storage/keys
      REPOFORGE_HTTP_PORT: "80"
      REPOFORGE_HTTPS_PORT: "443"
      REPOFORGE_TLS_CERT_FILE: /app/storage/tls/repoforge.crt
      REPOFORGE_TLS_KEY_FILE: /app/storage/tls/repoforge.key
      REPOFORGE_TLS_AUTO_GENERATE: "1"
      REPOFORGE_TLS_SUBJECT_ALT_NAMES: localhost,127.0.0.1
    volumes:
      - ./storage:/app/storage
