services:
  postgres:
    image: postgres:16
    container_name: repoforge-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repoforge}
      POSTGRES_USER: ${POSTGRES_USER:-repoforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repoforge-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - repoforge-postgres-data:/var/lib/postgresql/data

volumes:
  repoforge-postgres-data:
